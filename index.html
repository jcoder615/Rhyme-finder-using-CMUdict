<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Offline Rhyme Finder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #e2e8f0;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 600px;
  padding: 25px;
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

h1 {
  text-align: center;
}

input {
  width: 70%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-right: 10px;
}

button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

.results {
  margin-top: 20px;
  max-height: 300px;
  overflow-y: auto;
}

.word {
  padding: 6px;
  margin: 4px 0;
  background: rgba(255,255,255,0.08);
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Offline Rhyme Finder</h1>
  <input id="input" placeholder="Enter word...">
  <button onclick="findRhymes()">Find</button>
  <div id="status"></div>
  <div class="results" id="results"></div>
</div>

<script>
let dict = {};
let rhymeMap = {};

document.getElementById("status").textContent = "Loading dictionary...";

// Load CMU dictionary
fetch("cmudict.txt")
  .then(res => res.text())
  .then(text => {
    parseDict(text);
    document.getElementById("status").textContent = "Ready!";
  });

function parseDict(text) {
  const lines = text.split("\n");

  for (let line of lines) {
    if (!line || line.startsWith(";;;")) continue;

    const parts = line.trim().split(/\s+/);
    if (parts.length < 2) continue;

    // remove alternate pronunciation markers like WORD(1)
    let word = parts[0].replace(/\(\d+\)/, "");

    const phonemes = parts.slice(1);
    const rhymePart = getRhymePart(phonemes);

    dict[word] = rhymePart;

    if (!rhymeMap[rhymePart]) {
      rhymeMap[rhymePart] = [];
    }

    rhymeMap[rhymePart].push(word);
  }

  console.log("Loaded words:", Object.keys(dict).length);
}

    rhymeMap[rhymePart].push(word);
  }
}

// Find last stressed vowel → better rhymes
function getRhymePart(phonemes) {
  for (let i = phonemes.length - 1; i >= 0; i--) {
    if (phonemes[i].match(/[0-2]/)) {
      return phonemes.slice(i).join("-");
    }
  }
  return phonemes.slice(-2).join("-");
}

function findRhymes() {
const input = document.getElementById("input").value.trim().toUpperCase();
  const resultsDiv = document.getElementById("results");
  const status = document.getElementById("status");

  resultsDiv.innerHTML = "";

  if (!dict[input]) {
    status.textContent = "Word not found.";
    return;
  }

  const rhymePart = dict[input];
  const rhymes = rhymeMap[rhymePart] || [];

  status.textContent = rhymes.length + " rhymes found";

  rhymes.forEach(word => {
    if (word === input) return;

    const div = document.createElement("div");
    div.className = "word";
    div.textContent = word;
    resultsDiv.appendChild(div);
  });
}

// Enter key support
document.getElementById("input").addEventListener("keypress", e => {
  if (e.key === "Enter") findRhymes();
});
</script>

</body>
</html>
