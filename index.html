<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Offline Rhyme Finder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: #e2e8f0;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 600px;
  padding: 25px;
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

h1 {
  text-align: center;
}

input {
  width: 70%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-right: 10px;
}

button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

.results {
  margin-top: 20px;
  max-height: 300px;
  overflow-y: auto;
}

.word {
  padding: 6px;
  margin: 4px 0;
  background: rgba(255,255,255,0.08);
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Offline Rhyme Finder</h1>
  <input id="input" placeholder="Enter word...">
  <button onclick="findRhymes()">Find</button>
  <div id="status"></div>
  <div class="results" id="results"></div>
</div>
<script>
  let dict = {};
let rhymeMap = {};

document.getElementById("status").textContent = "Loading dictionary...";

fetch("./cmudict.txt")
  .then(res => {
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.text();
  })
  .then(text => {
    document.getElementById("status").textContent = "Parsing dictionary...";
    parseDict(text);

    document.getElementById("status").textContent =
      "Ready! Words loaded: " + Object.keys(dict).length;
  })
  .catch(err => {
    console.error(err);
    document.getElementById("status").textContent =
      "Dictionary failed to load";
  });

function parseDict(text) {
  const lines = text.split("\n");

  for (let line of lines) {
    if (!line || line.startsWith(";;;")) continue;

    const parts = line.trim().split(/\s+/);
    if (parts.length < 2) continue;

    let word = parts[0].replace(/\(\d+\)/, "");
    const phonemes = parts.slice(1);

    const rhymePart = getRhymePart(phonemes);

    dict[word] = rhymePart;

    if (!rhymeMap[rhymePart]) rhymeMap[rhymePart] = [];
    rhymeMap[rhymePart].push(word);
  }
}

function getRhymePart(phonemes) {
  for (let i = phonemes.length - 1; i >= 0; i--) {
    if (/[0-2]/.test(phonemes[i])) {
      return phonemes.slice(i).join("-");
    }
  }
  return phonemes.slice(-2).join("-");
}

function findRhymes() {
  const input = document.getElementById("input").value.trim().toUpperCase();
  const results = document.getElementById("results");

  results.innerHTML = "";

  if (!dict[input]) {
    document.getElementById("status").textContent = "Word not found.";
    return;
  }

  const key = dict[input];
  const list = rhymeMap[key] || [];

  document.getElementById("status").textContent =
    list.length + " rhymes found";

  for (let w of list) {
    if (w === input) continue;

    const div = document.createElement("div");
    div.className = "word";
    div.textContent = w;
    results.appendChild(div);
  }
}

document.getElementById("input").addEventListener("keypress", e => {
  if (e.key === "Enter") findRhymes();
});
</script>


</body>
</html>
